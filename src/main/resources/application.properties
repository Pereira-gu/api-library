spring.application.name=api-library

# Configurações do Banco de Dados
# Estas configurações são para rodar a aplicação localmente via IDE, conectando-se ao container Docker.
spring.datasource.url=jdbc:mysql://localhost:3306/biblioteca_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
# A senha está vazia, conforme definido no docker-compose.yml (MYSQL_ALLOW_EMPTY_PASSWORD: "yes")
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Regras de Negócio da Biblioteca
biblioteca.emprestimo.limite-livros=3
biblioteca.emprestimo.prazo-dias=7
biblioteca.emprestimo.multa-diaria=2.00
